<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Montserrat',system-ui,sans-serif;background:#F2EAE1;color:#2F4F56;font-size:14px;min-height:100vh}
a{color:inherit}
#auth{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F2EAE1}
.auth-box{background:#fff;border:1px solid #d4c9be;border-radius:12px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(47,79,86,0.10)}
.auth-box input{width:100%;padding:10px 12px;border:1px solid #d4c9be;border-radius:8px;font-size:14px;margin-bottom:0.75rem;outline:none;font-family:'Montserrat',sans-serif;background:#faf7f4;color:#2F4F56}
.auth-box input:focus{border-color:#2F4F56}
.auth-btn{width:100%;padding:11px;background:#2F4F56;color:#F2EAE1;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Montserrat',sans-serif}
.auth-btn:hover{background:#305057}
.auth-error{color:#e24b4a;font-size:12px;margin-top:8px;display:none;text-align:center}
#app{display:none;min-height:100vh}
.topbar{background:#2F4F56;border-bottom:1px solid #264448;padding:0 1.5rem;height:58px;display:flex;align-items:center;gap:8px;position:sticky;top:0;z-index:100}
